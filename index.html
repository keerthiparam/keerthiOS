<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>keerthiOS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <!-- Output section -->
  <div class="output" id="output" aria-live="polite"></div>
  
  <!-- Input area (Hidden initially until boot finishes) -->
  <div class="input-line" id="input-line" style="display: none;">
    <span class="prompt" id="prompt"><span class="prompt-user">guest@keerthiOS</span><span class="prompt-colon">:</span><span class="prompt-tilde">~</span><span class="prompt-dollar">$ </span></span>
    <input type="text" id="command" autocomplete="off" />
  </div>
  
  <script src="script.js"></script>
</body>
</html>
